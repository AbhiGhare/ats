<div class="min-h-screen bg-[#f8fafc] dark:bg-[#050505] transition-colors duration-500 flex flex-col font-sans text-slate-900 dark:text-white overflow-x-hidden relative">
  
  <!-- BACKGROUND ANIMATION (Blobs) -->
  <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
    <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-violet-500/20 dark:bg-violet-600/10 rounded-full blur-[120px] animate-blob"></div>
    <div class="absolute bottom-[10%] right-[-5%] w-[400px] h-[400px] bg-fuchsia-500/20 dark:bg-fuchsia-600/10 rounded-full blur-[100px] animate-blob animation-delay-2000"></div>
    <div class="absolute top-[20%] right-[10%] w-[300px] h-[300px] bg-indigo-500/20 dark:bg-indigo-600/10 rounded-full blur-[80px] animate-blob animation-delay-4000"></div>
  </div>

  <!-- FLOATING GLASS NAVBAR -->
  <nav class="fixed top-4 inset-x-0 z-50 max-w-5xl mx-auto px-4">
    <div class="bg-white/60 dark:bg-zinc-900/60 backdrop-blur-2xl border border-white/40 dark:border-white/10 rounded-3xl px-6 py-3 flex justify-between items-center shadow-2xl shadow-black/5">
      <div class="flex items-center space-x-2">
        <div class="w-10 h-10 bg-gradient-to-br from-violet-600 to-fuchsia-600 rounded-xl flex items-center justify-center shadow-lg shadow-violet-500/30">
          <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        </div>
        <span class="text-xl font-black tracking-tighter italic">ATS <span class="text-violet-600 dark:text-violet-400 font-bold not-italic">SmartCheck</span></span>
      </div>

      <div class="flex items-center space-x-3">
        <button (click)="toggleTheme()" class="p-2.5 rounded-2xl bg-white/50 dark:bg-white/5 border border-white dark:border-white/10 hover:scale-110 transition-all active:scale-95">
          @if (isDarkMode()) {
            <span class="text-xl">🌙</span>
          } @else {
            <span class="text-xl">☀️</span>
          }
        </button>
        <button class="bg-slate-900 dark:bg-white text-white dark:text-black px-6 py-2.5 rounded-2xl font-bold text-sm hover:shadow-xl transition-all">Get Pro</button>
      </div>
    </div>
  </nav>

  <main class="relative z-10 pt-32 flex-grow">
    <app-ats-checker />
  </main>
</div>
